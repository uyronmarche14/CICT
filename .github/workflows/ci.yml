name: CI — Quality Gates

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: ['**']

env:
  NODE_VERSION: '20'

jobs:
  backend-checks:
    name: Backend — Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cict-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./cict-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  frontend-checks:
    name: Frontend — Lint, TypeCheck, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cictv4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./cictv4/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  security-audit:
    name: Security — Dep Audit & CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: .github/codeql-config.yml

      - name: Backend audit
        working-directory: ./cict-backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend audit
        working-directory: ./cictv4
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Security — Secret Leakage Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  dependency-review:
    name: Security — Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
